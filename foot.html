<!DOCTYPE html>
<html>
<head>
<title>Footer</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#121212;
}

.footer{
    background:#121212;
    color:#fff;
    padding:8px 20px;
}

.footer-section{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.footer-box{
    display:flex;
    align-items:center;
    gap:10px;
}

.logo{
    width:45px;
    height:auto;
}

.footer-box h3{
    font-size:12px;
    margin-bottom:3px;
}

.footer-box p,
.footer-box a{
    font-size:10px;
    color:#ddd;
    text-decoration:none;
    line-height:1.3;
}

.footer-box ul{
    list-style:none;
}

.footer-box ul li{
    margin:2px 0;
}

.footer-box a:hover{
    color:#f39c12;
}

.social-icons{
    display:flex;
    gap:6px;
}

.social-icons img{
    width:22px;
    height:22px;
    border-radius:50%;
}

hr{
    border:1px solid #444;
    margin:6px 0;
}

.footer-bottom{
    text-align:center;
    font-size:10px;
    color:#bbb;
}

/* Hide Audio */
#bgmusic{
    display:none;
}

</style>

</head>

<body>



<footer class="footer">

<div class="footer-section">

    <!-- Logo & Social -->
    <div class="footer-box">

        <a href="index.html">
            <img src="logo.jpg" class="logo" alt="Logo">
        </a>

        <div class="social-icons">

            <a href="https://www.instagram.com/aurora_5tar?igsh=ZzQyaDZsNjg1aG96&utm_source=qr" target="_blank">
                <img src="ig.jpg" alt="Instagram">
            </a>

            <a href="https://www.tiktok.com/@aur0ra0_3?_r=1&_t=ZS-97ZlI6jhbqi" target="_blank">
                <img src="tiktok.jpg" alt="TikTok">
            </a>

            <a href="https://www.facebook.com/share/1JUmShQ6wP/?mibextid=wwXIfr" target="_blank">
                <img src="facebook.jpg" alt="Facebook">
            </a>
        </div>

    </div>

    <!-- Contact -->
    <div class="footer-box">

        <div>
            <h3>Contact</h3>
            <p>📧 auroraa0star@gmail.com</p>
            <p>📞 +6013-4643124</p>
            <p>📞 +6012-8655174</p>
        </div>

    </div>

    <!-- Quick Links -->
    <div class="footer-box">

        <div>
            <h3>Quick Links</h3>

            <ul>
                <li><a href="home.html" target="center">Homepage</a></li>
                <li><a href="about.html" target="center">About Us</a></li>
                <li><a href="gallery.html" target="center">Gallery</a></li>
                <li><a href="feedback.html" target="center">Feedback</a></li>
            </ul>

        </div>

    </div>

</div>

<hr>

<div class="footer-bottom">
    © 2026 Aurora Star Sdn. Bhd.
</div>

</footer>

</body>
</html>
